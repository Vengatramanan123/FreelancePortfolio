<nav class="fixed top-0 w-full z-50 backdrop-blur-md bg-surface/80 border-b border-border">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
    <!-- Logo -->
    <div class="font-syne text-2xl font-600 text-text-primary">
      VengatRamanan
    </div>
    
    <!-- Links -->
    <div class="hidden md:flex items-center gap-12">
      <a href="#about" class="text-text-muted hover:text-primary transition">About</a>
      <a href="#services" class="text-text-muted hover:text-primary transition">Services</a>
      <a href="#pricing" class="text-text-muted hover:text-primary transition">Pricing</a>
      <a href="#contact" class="text-text-muted hover:text-primary transition">Contact</a>
    </div>
    
    <!-- CTA Button -->
    <button class="btn btn-primary hidden md:block"
    (click)="openContactForm()">
      Get In Touch
    </button>
    
    <!-- Mobile Menu Toggle -->
    <button class="md:hidden text-text-muted hover:text-primary"
    (click)="toggleMenu()"
    [attr.aria-expanded]="isMenuOpen">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
      </svg>
    </button>
  </div>

  <div class="md:hidden"
    [ngClass]="{'block': isMenuOpen, 'hidden': !isMenuOpen}">
    <div class="px-6 pb-6 space-y-4">
      <a href="#about" (click)="closeMenu()" class="block text-text-muted hover:text-primary transition">About</a>
      <a href="#services" (click)="closeMenu()" class="block text-text-muted hover:text-primary transition">Services</a>
      <a href="#pricing" (click)="closeMenu()" class="block text-text-muted hover:text-primary transition">Pricing</a>
      <a href="#contact" (click)="closeMenu()" class="block text-text-muted hover:text-primary transition">Contact</a>
      <button class="btn btn-primary w-full" (click)="openContactForm()">Get In Touch</button>
    </div>
  </div>
</nav>
